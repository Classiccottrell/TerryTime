name: Deploy to GitHub Pages

# Builds the Next.js app as a static export and publishes it to GitHub Pages.
# The Stripe checkout and newsletter API routes are server-only and are not
# part of this static build; their UI degrades to a "runs on the live site"
# notice (see lib/site.ts).

on:
  push:
    branches:
      - main
      - claude/github-pages-setup-5pujfv
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      STATIC_EXPORT: "true"
      NEXT_PUBLIC_STATIC_EXPORT: "true"
      # Project page is served from /<repo>. Set to "" for a custom domain
      # or a user/org (<user>.github.io) page.
      NEXT_PUBLIC_BASE_PATH: "/TerryTime"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Route handlers (POST) can't be statically exported. Drop them so the
      # export build succeeds; the source on the branch is untouched.
      - name: Remove server-only API routes
        run: rm -rf app/api

      - name: Build static export
        run: npm run build

      - name: Configure Pages
        # enablement: true turns on Pages (source = GitHub Actions) on first run
        # so the repo doesn't need to be configured manually in Settings first.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
