<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Arial Narrow', sans-serif">
  <rect width="800" height="600" fill="#1a1a1a"/>
  <rect x="16" y="16" width="768" height="568" fill="none" stroke="#ffe135" stroke-width="3"/>
  <text x="40" y="80" fill="#ffe135" font-size="48" font-weight="bold" letter-spacing="3">UNFINISHED LINES</text>
  <text x="40" y="108" fill="#f5f5f5" font-size="18" font-family="monospace">Terry the Sketcher — finish the line yourself.</text>

  <!-- Sticker 1: an open, unfinished face -->
  <g stroke="#f5f5f5" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M120 220 q40 -60 90 -20"/>
    <path d="M130 260 q30 40 80 20"/>
    <path d="M150 200 l0 90"/>
    <circle cx="170" cy="240" r="6" fill="#ffe135" stroke="none"/>
  </g>

  <!-- Sticker 2: a half-drawn cube -->
  <g stroke="#ffe135" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M330 200 l70 0 l0 70"/>
    <path d="M330 200 l0 70 l70 0"/>
    <path d="M400 200 l40 -25"/>
    <path d="M440 175 l0 70"/>
  </g>

  <!-- Sticker 3: scribble that stops -->
  <g stroke="#cc0000" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M560 210 q40 0 40 30 t-40 30 t40 30"/>
  </g>

  <!-- Sticker 4: horizon line, unfinished -->
  <g stroke="#f5f5f5" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M120 420 l180 0"/>
    <path d="M150 420 l30 -40"/>
    <path d="M240 420 l20 -60"/>
  </g>

  <text x="40" y="540" fill="#808080" font-size="14" font-family="monospace">terryterrylarryberry.com — #addmore #eastvan — remix freely</text>
</svg>
