<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Arial Narrow', sans-serif">
  <rect width="800" height="600" fill="#0f0f0f"/>
  <rect x="16" y="16" width="768" height="568" fill="none" stroke="#2d5f2e" stroke-width="3"/>
  <text x="40" y="90" fill="#2d5f2e" font-size="56" font-weight="bold" letter-spacing="2">#ADDMORE ZINE</text>
  <text x="40" y="120" fill="#e8e8e8" font-size="18" font-family="monospace">Community curated — remixes from the collective.</text>

  <!-- gradient divider: the shouting match -->
  <defs>
    <linearGradient id="d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="0.35" stop-color="#ffe135"/>
      <stop offset="0.7" stop-color="#cc0000"/>
      <stop offset="1" stop-color="#2d5f2e"/>
    </linearGradient>
  </defs>
  <rect x="40" y="150" width="720" height="4" fill="url(#d)"/>

  <text x="40" y="240" fill="#f5f5f5" font-size="28" font-family="monospace">SEE IT TWICE.</text>
  <text x="40" y="290" fill="#ffe135" font-size="28" font-family="monospace">DRAW IT AGAIN.</text>
  <text x="40" y="340" fill="#cc0000" font-size="28" font-family="monospace">SHOOT THE MOMENT.</text>
  <text x="40" y="390" fill="#808080" font-size="28" font-family="monospace">CUT WHAT'S TOO MUCH.</text>

  <text x="40" y="500" fill="#e8e8e8" font-size="16" font-family="monospace">Tag your work #addmore — the best ends up in next month's issue.</text>
  <text x="40" y="540" fill="#808080" font-size="14" font-family="monospace">terryterrylarryberry.com — East Van — one sticker, infinite hustle</text>
</svg>
