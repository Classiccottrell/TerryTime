<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="High-contrast East Van street skyline at a severe angle">
  <rect width="800" height="600" fill="#0f0f0f"/>
  <!-- skewed street / skyline, documentary red + white -->
  <g transform="rotate(-6 400 300)">
    <rect x="80" y="320" width="90" height="260" fill="#1c1c1c"/>
    <rect x="190" y="240" width="110" height="340" fill="#161616"/>
    <rect x="320" y="300" width="80" height="280" fill="#1c1c1c"/>
    <rect x="420" y="180" width="130" height="400" fill="#121212"/>
    <rect x="570" y="280" width="100" height="300" fill="#181818"/>
    <!-- lit windows -->
    <g fill="#e8e8e8" opacity="0.85">
      <rect x="210" y="270" width="14" height="14"/><rect x="240" y="270" width="14" height="14"/>
      <rect x="210" y="310" width="14" height="14"/><rect x="270" y="330" width="14" height="14"/>
      <rect x="450" y="220" width="16" height="16"/><rect x="486" y="220" width="16" height="16"/>
      <rect x="450" y="260" width="16" height="16"/><rect x="522" y="300" width="16" height="16"/>
    </g>
    <g fill="#e0301e">
      <rect x="240" y="310" width="14" height="14"/>
      <rect x="486" y="260" width="16" height="16"/>
      <rect x="600" y="320" width="14" height="14"/>
    </g>
  </g>
  <!-- viewfinder frame -->
  <g fill="none" stroke="#e0301e" stroke-width="3">
    <path d="M60 110 h60 M60 110 v60"/>
    <path d="M740 110 h-60 M740 110 v60"/>
    <path d="M60 490 h60 M60 490 v-60"/>
    <path d="M740 490 h-60 M740 490 v-60"/>
  </g>
  <text x="40" y="70" font-family="'IBM Plex Mono', monospace" font-size="20" letter-spacing="3" fill="#e0301e">EAST VAN — f/2.8</text>
</svg>
