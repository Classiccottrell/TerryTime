<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Two overlapping circles on charcoal, a study in duality">
  <rect width="800" height="600" fill="#2c2c2c"/>
  <g fill="none" stroke="#808080" stroke-width="2">
    <circle cx="330" cy="300" r="180"/>
    <circle cx="470" cy="300" r="180"/>
  </g>
  <circle cx="330" cy="300" r="180" fill="#808080" opacity="0.10"/>
  <circle cx="470" cy="300" r="180" fill="#f5f5f5" opacity="0.06"/>
  <circle cx="330" cy="300" r="6" fill="#ffe135"/>
  <circle cx="470" cy="300" r="6" fill="#f5f5f5"/>
  <line x1="120" y1="300" x2="680" y2="300" stroke="#808080" stroke-width="1" opacity="0.4"/>
  <text x="40" y="70" font-family="'IBM Plex Mono', monospace" font-size="22" letter-spacing="3" fill="#808080" opacity="0.7">SEE IT TWICE</text>
</svg>
