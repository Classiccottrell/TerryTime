  <rect x="40" y="40" width="720" height="340" fill="none" stroke="#2d5f2e" stroke-width="3"/>
  <defs>
    <linearGradient id="d2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#141312"/><stop offset="0.35" stop-color="#ffe135"/>
      <stop offset="0.7" stop-color="#e0301e"/><stop offset="1" stop-color="#2d5f2e"/>
