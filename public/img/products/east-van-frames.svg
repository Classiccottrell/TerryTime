<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-label="High-contrast street photography sticker frames">
  <rect width="800" height="420" fill="#141210"/>
  <g>
    <!-- photo 1 -->
    <g transform="rotate(-4 180 180)">
      <rect x="80" y="80" width="200" height="200" fill="#161616" stroke="#eae3d2" stroke-width="6"/>
      <path d="M100 240 l40 -90 l40 60 l30 -40 l50 70 z" fill="#2a2a2a"/>
      <circle cx="240" cy="120" r="16" fill="#e23b2e"/>
    </g>
    <!-- photo 2 -->
    <g transform="rotate(5 470 170)">
      <rect x="360" y="70" width="220" height="200" fill="#161616" stroke="#eae3d2" stroke-width="6"/>
      <rect x="390" y="120" width="40" height="120" fill="#2a2a2a"/>
      <rect x="450" y="100" width="50" height="140" fill="#242424"/>
      <rect x="520" y="140" width="36" height="100" fill="#2a2a2a"/>
      <rect x="404" y="150" width="10" height="10" fill="#eae3d2"/>
      <rect x="462" y="130" width="10" height="10" fill="#e23b2e"/>
    </g>
    <!-- photo 3 -->
    <g transform="rotate(-3 660 320)">
      <rect x="590" y="240" width="150" height="150" fill="#161616" stroke="#eae3d2" stroke-width="6"/>
      <path d="M610 360 q60 -90 120 0 z" fill="#2a2a2a"/>
      <circle cx="650" cy="300" r="10" fill="#e23b2e"/>
    </g>
    <!-- contact strip dots -->
    <g fill="#e23b2e">
      <rect x="120" y="320" width="14" height="14"/><rect x="150" y="320" width="14" height="14"/><rect x="180" y="320" width="14" height="14"/>
    </g>
  </g>
</svg>
